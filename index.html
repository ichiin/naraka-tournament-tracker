<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track hero picks across Naraka Bladepoint tournaments. Solo and trios mode. No login required." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script>
      (function() {
        var r = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (r && r !== location.href) {
          history.replaceState(null, '', r);
        }
      })();
    </script>
    <title>Naraka Tournament Tracker</title>
